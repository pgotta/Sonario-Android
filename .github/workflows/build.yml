name: Build & Release

on:
  push:
    branches: [ main, 'upgrade/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: focal-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

  release:
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/upgrade/'))
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: focal-debug-apk
          path: ./artifacts

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "name=Latest Build (${GITHUB_REF_NAME})" >> $GITHUB_OUTPUT
          fi

      - name: Create / Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## Focal for Android

            Multi-provider BYOK AI summariser. Paste any YouTube link, article URL, or text and get a summary powered by the LLM provider you choose.

            ### Downloads
            - **focal-debug.apk** — debug build, install directly on your phone

            ### Setup
            1. Download and install the APK (allow "install from unknown sources")
            2. Open Focal → tap the gear icon
            3. Choose **On-device** or **Cloud**
            4. If Cloud, pick a provider and paste your API key
            5. Pick a model and start summarising

            ### Supported providers
            - Groq (free tier)
            - OpenAI
            - Anthropic (Claude)
            - Ollama (local, no key needed)
            - Custom (any OpenAI-compatible proxy)
          files: ./artifacts/*.apk
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
